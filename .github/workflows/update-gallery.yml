name: Update Gallery Images

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Baumfaellung/**'
      - 'Hecken/**'
      - 'Zaun/**'

jobs:
  update-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate images.js
        run: |
          # Function to generate a JS array from a folder
          generate_array() {
            local folder="$1"
            local varname="$2"
            echo "const ${varname} = [" >> images.js
            if [ -d "$folder" ]; then
              # Find all image files, safely handle names with spaces
              find "$folder" -maxdepth 1 -type f \( -iname \*.jpg -o -iname \*.jpeg -o -iname \*.png -o -iname \*.gif -o -iname \*.webp \) -exec basename {} \; | sort | awk '
                BEGIN { first = 1 }
                {
                  if (first) {
                    printf "  \"%s\"", $0
                    first = 0
                  } else {
                    printf ",\n  \"%s\"", $0
                  }
                }
                END { if (!first) print "" }
              ' >> images.js
            fi
            echo "];" >> images.js
          }

          # Clear and regenerate
          > images.js
          generate_array "Baumfaellung" "imagesBaumfaellung"
          generate_array "Hecken" "imagesHecken"
          generate_array "Zaun" "imagesZaun"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add images.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update images.js from category folders" && git push)

      - name: Trigger GitHub Pages rebuild
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
